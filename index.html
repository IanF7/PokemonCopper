<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Pokémon Copper</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: #111;
      color: white;
      overflow-x: hidden;
    }

    /* Hero section (title image) */
    .hero {
      position: relative;
      height: 100vh;
      width: 100%;
      background: url('images/title.png') no-repeat center center/cover;
    }

    /* Fade overlay */
    .fade {
      position: absolute;
      bottom: 0;
      width: 100%;
      height: 200px;
      background: linear-gradient(to bottom, rgba(0,0,0,0), #111);
    }

    /* Navigation section */
    .content {
      text-align: center;
      padding: 60px 20px;
      background: #111;
    }

    h1 {
      margin-bottom: 30px;
      font-size: 2.5rem;
    }

    .links {
      display: flex;
      justify-content: center;
      gap: 30px;
      flex-wrap: wrap;
    }

    .links a {
      text-decoration: none;
      color: white;
      border: 2px solid white;
      padding: 15px 25px;
      border-radius: 8px;
      transition: 0.3s;
      font-size: 1.2rem;
    }

    .links a:hover {
      background: white;
      color: black;
    }

    /* Smooth scroll behavior */
    html {
      scroll-behavior: smooth;
    }
  </style>
</head>

<body>

  <!-- Title Image Section -->
  <section class="hero">
    <div class="fade"></div>
  </section>

  <!-- Main Content -->
  <section class="content">
    <h1>Your Pokémon Game</h1>

    <div class="links">
      <a href="downloads.html">Downloads</a>
      <a href="info.html">Game Info</a>
      <a href="https://discord.gg/YOUR_LINK" target="_blank">Join Discord</a>
    </div>
  </section>

</body>
</html>
